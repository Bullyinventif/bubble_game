<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Game | Cyber Edition</title>
  <link rel="icon" type="image/png" href="bully_icon_site_1.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@600;700;900&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="aura"></div>
  <div class="grid-bg"></div>
  <div class="bubble-bg" id="bubbleBg"></div>

  <nav>
    <a href="./index.html" class="nav-logo">🫧</a>
    <div class="brand">BUBBLE<b>GAME</b></div>
    <div class="nav-links">
      <a href="./index.html" class="active">Accueil</a>
      <a href="./jeux.html">Jeux</a>
      <a href="./credits.html" class="green">Crédits</a>
    </div>
    <a href="https://bullyinventif.github.io/bubble-site/bubble_site_profil.html" class="nav-profile-widget">
      <div class="nav-profile-info">
        <span class="nav-profile-name" id="navProfileName">...</span>
        <span class="nav-profile-sub" id="navProfileSub">—</span>
      </div>
      <div class="nav-avatar-bubble" id="navAvatarBubble">🧙</div>
    </a>
    <button class="nav-burger" id="menuToggle" aria-label="Menu">☰</button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-menu-close" id="menuClose" aria-label="Fermer">✕</button>
    <a href="./index.html" class="active">Accueil 🏠</a>
    <a href="./jeux.html">Jeux 🎮</a>
    <a href="./credits.html">Crédits 👽</a>
  </div>

  <div class="wrap">
    <div class="hero" id="hero"></div>

    <div class="row">
      <h2>Ajouts <span>récents</span></h2>
      <a class="see-all" href="./jeux.html">Voir tout →</a>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <footer>🫧 Bubble inc. — Copyright | <span id="year"></span></footer>

  <!-- Firebase (version compat, scripts classiques) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <!-- Scripts du site (ordre important) -->
  <script src="firebase-init.js"></script>
  <script src="games-data.js"></script>
  <script src="render.js"></script>
  <script>
    requireAccess();
    initChrome();
    mountBubbles(document.getElementById('bubbleBg'));

    var recent = gamesByRecent();
    document.getElementById('hero').innerHTML = heroMarkup(recent[0]);
    document.getElementById('grid').innerHTML = recent.slice(0, 3).map(gameCard).join('');
  </script>
</body>
</html>
