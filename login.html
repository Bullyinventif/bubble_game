<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Bubble Game</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:linear-gradient(160deg,#1a0060 0%,#5500dd 40%,#3300aa 100%);
    min-height:100vh; font-family:'Nunito',sans-serif; color:white;
    overflow-x:hidden; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  .bubble-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
  .bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.25),rgba(100,150,255,.05));border:1px solid rgba(255,255,255,.15);animation:floatUp linear infinite;}
  @keyframes floatUp{0%{transform:translateY(110vh) scale(.8);opacity:0}10%{opacity:.6}90%{opacity:.3}100%{transform:translateY(-10vh) scale(1.1);opacity:0}}
  .container{position:relative;z-index:1;width:min(420px,94vw);display:flex;flex-direction:column;align-items:center;gap:24px;padding:20px 0 40px;}
  .logo{font-family:'Permanent Marker',cursive;font-size:clamp(2.5rem,9vw,4rem);line-height:1;letter-spacing:2px;text-align:center;}
  .game-word{font-family:'Orbitron',monospace;font-size:.6em;color:#FFE000;text-shadow:0 0 20px rgba(255,220,0,.5);letter-spacing:4px;}
  .card{width:100%;background:linear-gradient(145deg,rgba(68,136,255,.2),rgba(50,100,200,.15));backdrop-filter:blur(16px);border:1.5px solid rgba(255,255,255,.2);border-radius:22px;padding:28px 26px;box-shadow:0 12px 40px rgba(0,0,50,.5);animation:fadeUp .5s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .card-title{font-family:'Orbitron',monospace;font-size:.65rem;text-align:center;margin-bottom:22px;color:rgba(255,255,255,.6);letter-spacing:3px;text-transform:uppercase;}
  .tabs{display:flex;gap:8px;margin-bottom:22px;}
  .tab{flex:1;padding:9px;border-radius:12px;border:1.5px solid rgba(255,255,255,.12);font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);}
  .tab.active{background:rgba(255,255,255,.2);color:white;border-color:rgba(255,255,255,.4);}
  .form-group{margin-bottom:14px;}
  .form-group label{display:block;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.45);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase;}
  .form-group input{width:100%;background:rgba(0,0,0,.25);border:1.5px solid rgba(255,255,255,.18);border-radius:10px;color:white;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;transition:border-color .2s;}
  .form-group input:focus{outline:none;border-color:rgba(100,180,255,.6);}
  .form-group input::placeholder{color:rgba(255,255,255,.2);}
  .btn-submit{width:100%;padding:12px;background:linear-gradient(135deg,#00ff88,#00cc66);border:none;border-radius:12px;color:#002200;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;margin-top:6px;box-shadow:0 4px 0 rgba(0,80,0,.4);}
  .btn-submit:hover{filter:brightness(1.1);transform:translateY(-2px);}
  .btn-submit:active{transform:translateY(2px);box-shadow:none;}
  .btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .error-msg{background:rgba(255,60,60,.15);border:1px solid rgba(255,80,80,.35);border-radius:10px;color:#ffaaaa;padding:10px 14px;font-size:.82rem;font-weight:700;margin-bottom:14px;display:none;}
  .error-msg.show{display:block;}
  .no-abo-msg{background:rgba(255,200,0,.12);border:1px solid rgba(255,200,0,.35);border-radius:10px;color:#ffe866;padding:12px 14px;font-size:.82rem;font-weight:700;margin-bottom:14px;display:none;text-align:center;line-height:1.6;}
  .no-abo-msg.show{display:block;}
  .no-abo-msg a{color:#FFE000;text-decoration:underline;}
  .form-panel{display:none;}
  .form-panel.active{display:block;}
  footer{position:relative;z-index:1;color:rgba(255,255,255,.2);font-size:.6rem;font-family:'Orbitron',monospace;letter-spacing:2px;margin-top:8px;}
</style>
</head>
<body>

<div class="bubble-bg" id="bubbleBg"></div>

<div class="container">
  <div class="logo">
    <span style="color:#4488ff">B</span><span style="color:#00ff88">u</span><span style="color:#FFE000">b</span><span style="color:#00ccff">b</span><span style="color:#ff8800">l</span><span style="color:#aaaaaa">e</span>
    <span class="game-word"> Game.</span>
  </div>

  <div class="card">
    <div class="card-title">🎮 Accès membres</div>

    <div class="no-abo-msg" id="noAboMsg">
      ⚠️ Tu as besoin d'un abonnement <strong>Bubble X</strong> ou supérieur pour accéder.<br><br>
      <a href="https://bullyinventif.github.io/bubble-site/bubble_site_abonnements.html">✨ Voir les abonnements →</a>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Connexion</button>
      <button class="tab" onclick="switchTab('register')">Inscription</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-panel active" id="panelLogin">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="ton@email.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="loginPwd" placeholder="••••••••">
      </div>
      <button class="btn-submit" id="btnLogin" onclick="handleLogin()">🚀 Jouer !</button>
    </div>

    <div class="form-panel" id="panelRegister">
      <div class="form-group">
        <label>Pseudo</label>
        <input type="text" id="regPseudo" placeholder="Ton pseudo...">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="ton@email.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="regPwd" placeholder="Minimum 6 caractères">
      </div>
      <button class="btn-submit" id="btnRegister" onclick="handleRegister()">✨ Créer mon compte</button>
    </div>
  </div>
</div>

<footer>© BUBBLE INC.</footer>

<script>
  const bg=document.getElementById('bubbleBg');
  for(let i=0;i<18;i++){
    const b=document.createElement('div');b.className='bubble';
    const size=20+Math.random()*80;
    b.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*10}s;`;
    bg.appendChild(b);
  }
  function switchTab(tab){
    document.getElementById('panelLogin').classList.toggle('active',tab==='login');
    document.getElementById('panelRegister').classList.toggle('active',tab==='register');
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
    hideError();
  }
  function showError(msg){const el=document.getElementById('errorMsg');el.textContent=msg;el.classList.add('show');}
  function hideError(){document.getElementById('errorMsg').classList.remove('show');}
  function setLoading(id,on){
    const btn=document.getElementById(id);
    btn.disabled=on;
    btn.textContent=on?'⏳ Vérification...':(id==='btnLogin'?'🚀 Jouer !':'✨ Créer mon compte');
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app  = initializeApp({
    apiKey:"AIzaSyAbtOtU3EZd3yccR8gPCef_wME-5qoNk3Y",
    authDomain:"bubble-game-fa894.firebaseapp.com",
    projectId:"bubble-game-fa894",
    storageBucket:"bubble-game-fa894.firebasestorage.app",
    messagingSenderId:"60256418096",
    appId:"1:60256418096:web:dbdc555819793d8c20f0f5"
  });
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const SUB_ORDER = {basic:0,plus:1,x:2,max:3};

  async function checkAndRedirect(user) {
    try {
      const snap = await getDoc(doc(db,'users',user.uid));
      const sub  = snap.exists() ? (snap.data().subscription||'basic') : 'basic';
      if (SUB_ORDER[sub] >= SUB_ORDER['x']) {
        window.location.href = './index.html';
      } else {
        document.getElementById('noAboMsg').classList.add('show');
        document.getElementById('panelLogin').style.display = 'none';
        document.getElementById('panelRegister').style.display = 'none';
        document.querySelector('.tabs').style.display = 'none';
      }
    } catch(e) { showError('❌ Erreur : '+e.message); }
  }

  onAuthStateChanged(auth, user => { if(user) checkAndRedirect(user); });

  const ERRORS = {
    'auth/invalid-email':       '❌ Email invalide.',
    'auth/user-not-found':      '❌ Aucun compte avec cet email.',
    'auth/wrong-password':      '❌ Mot de passe incorrect.',
    'auth/email-already-in-use':'❌ Email déjà utilisé.',
    'auth/weak-password':       '❌ Minimum 6 caractères.',
    'auth/too-many-requests':   '❌ Trop de tentatives, réessaie plus tard.',
    'auth/invalid-credential':  '❌ Email ou mot de passe incorrect.',
  };

  window.handleLogin = async function(){
    hideError();
    const email=document.getElementById('loginEmail').value.trim();
    const pwd  =document.getElementById('loginPwd').value;
    if(!email||!pwd){showError('⚠️ Remplis tous les champs !');return;}
    setLoading('btnLogin',true);
    try {
      const cred=await signInWithEmailAndPassword(auth,email,pwd);
      await checkAndRedirect(cred.user);
    } catch(e){ showError(ERRORS[e.code]||'❌ '+e.message); setLoading('btnLogin',false); }
  };

  window.handleRegister = async function(){
    hideError();
    const pseudo=document.getElementById('regPseudo').value.trim();
    const email =document.getElementById('regEmail').value.trim();
    const pwd   =document.getElementById('regPwd').value;
    if(!pseudo||!email||!pwd){showError('⚠️ Remplis tous les champs !');return;}
    if(pwd.length<6){showError('❌ Minimum 6 caractères !');return;}
    setLoading('btnRegister',true);
    try {
      const cred=await createUserWithEmailAndPassword(auth,email,pwd);
      await updateProfile(cred.user,{displayName:pseudo});
      await setDoc(doc(db,'users',cred.user.uid),{pseudo,subscription:'basic',avatarId:'bully_1'});
      await checkAndRedirect(cred.user);
    } catch(e){ showError(ERRORS[e.code]||'❌ '+e.message); setLoading('btnRegister',false); }
  };
</script>

</body>
</html>
