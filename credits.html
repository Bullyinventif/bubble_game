<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crédits — Bubble Game</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-bg: #5500dd;
    --blue-card: #3366cc;
    --blue-card-light: #4488ee;
    --yellow: #FFE000;
    --green-neon: #00ff88;
    --pink: #ff44aa;
    --cyan: #00ccff;
    --orange: #ff8800;
    --gray: #aaaaaa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #1a0060 0%, var(--purple-bg) 40%, #3300aa 100%);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    color: white;
    overflow-x: hidden;
  }

  /* Bubbles background */
  .bubble-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.2), rgba(100,150,255,0.03));
    border: 1px solid rgba(255,255,255,0.12);
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh); opacity: 0; }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.25; }
    100% { transform: translateY(-10vh); opacity: 0; }
  }

  /* NAV */
  nav {
    position: relative;
    z-index: 100;
    display: flex;
    align-items: center;
    padding: 12px 24px;
    background: rgba(0,0,0,0.35);
    border-bottom: 2px solid rgba(255,255,255,0.1);
    gap: 8px;
    flex-wrap: wrap;
  }
  .nav-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #4488ff, #aa44ff);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    margin-right: 8px;
    box-shadow: 0 0 12px rgba(100,150,255,0.5);
  }
  .nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
  .nav-links a {
    color: white; text-decoration: none;
    font-size: 0.95rem; font-weight: 700;
    padding: 4px 14px; border-radius: 20px;
    transition: all 0.2s; opacity: 0.85;
  }
  .nav-links a:hover { background: rgba(255,255,255,0.15); opacity: 1; }
  .nav-links a.active { color: var(--green-neon); text-shadow: 0 0 10px rgba(0,255,136,0.6); }

  /* HEADER */
  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 50px 20px 20px;
  }
  .site-title {
    font-family: 'Permanent Marker', cursive;
    font-size: clamp(2.2rem, 6vw, 4rem);
    line-height: 1;
  }
  .game-word {
    font-family: 'Orbitron', monospace;
    font-size: 0.75em;
    color: var(--yellow);
    text-shadow: 0 0 20px rgba(255,220,0,0.5);
    letter-spacing: 4px;
  }
  .page-label {
    display: inline-block;
    margin-top: 14px;
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    border-top: 1px solid rgba(255,255,255,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding: 6px 20px;
  }

  /* MAIN */
  main {
    position: relative; z-index: 10;
    max-width: 680px;
    margin: 40px auto 60px;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* SECTION */
  .section {
    background: linear-gradient(145deg, var(--blue-card-light), var(--blue-card));
    border-radius: 18px;
    border: 2px solid rgba(255,255,255,0.15);
    box-shadow: 0 8px 25px rgba(0,0,50,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.15);
  }
  .section-icon { font-size: 1.4rem; }
  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
  }

  .section-body { padding: 22px; }

  /* BUBBLE INC CARD */
  .bubble-inc {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .bubble-inc-logo {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #4488ff, #aa44ff);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    box-shadow: 0 0 25px rgba(100,150,255,0.5);
    flex-shrink: 0;
  }
  .bubble-inc-info { flex: 1; }
  .bubble-inc-name {
    font-family: 'Permanent Marker', cursive;
    font-size: 1.8rem;
    line-height: 1.1;
  }
  .bubble-inc-name .b { color: #4488ff; }
  .bubble-inc-name .u { color: var(--green-neon); }
  .bubble-inc-name .b2 { color: var(--yellow); }
  .bubble-inc-name .b3 { color: var(--cyan); }
  .bubble-inc-name .l { color: var(--orange); }
  .bubble-inc-name .e { color: var(--gray); }
  .bubble-inc-name .inc {
    font-family: 'Orbitron', monospace;
    font-size: 0.55em;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    display: block;
    margin-top: 2px;
  }
  .bubble-inc-role {
    margin-top: 8px;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
  }
  .bubble-inc-role span {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 2px 12px;
    margin: 2px 3px 2px 0;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.75);
  }

  /* MUSIC TABLE */
  .music-table {
    width: 100%;
    border-collapse: collapse;
  }
  .music-table th {
    text-align: left;
    font-size: 0.72rem;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    padding: 0 10px 12px 10px;
    font-family: 'Orbitron', monospace;
  }
  .music-table td {
    padding: 10px;
    font-size: 0.88rem;
    vertical-align: middle;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .music-table tr:first-child td { border-top: none; }
  .music-table tr:hover td { background: rgba(255,255,255,0.04); }

  .music-name { font-weight: 700; color: white; }
  .music-artist { color: rgba(255,255,255,0.55); font-size: 0.82rem; }
  .music-game {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
  }
  .music-game.g1 { background: rgba(68,136,255,0.25); color: #88ccff; }
  .music-game.g2 { background: rgba(0,255,136,0.15); color: var(--green-neon); }
  .music-game.g3 { background: rgba(255,170,68,0.2); color: #ffaa44; }
  .music-game.g4 { background: rgba(255,68,170,0.2); color: var(--pink); }

  .music-link {
    color: rgba(255,255,255,0.3);
    font-size: 0.8rem;
    text-decoration: none;
    transition: color 0.2s;
  }
  .music-link:hover { color: var(--yellow); }

  /* ADD ROW button */
  .add-music-hint {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    border: 1px dashed rgba(255,255,255,0.15);
    font-size: 0.78rem;
    color: rgba(255,255,255,0.35);
    line-height: 1.6;
  }
  .add-music-hint code {
    background: rgba(0,0,0,0.3);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--yellow);
    font-size: 0.75rem;
  }

  /* FOOTER */
  footer {
    position: relative; z-index: 10;
    text-align: center;
    padding: 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.3);
    font-size: 0.8rem;
  }

  /* PROFILE NAV */
  .nav-profile-widget {
    margin-left:auto; display:flex; align-items:center; gap:8px;
    text-decoration:none; cursor:pointer; transition:opacity .2s;
  }
  .nav-profile-widget:hover { opacity:.85; }
  .nav-avatar-bubble {
    width:34px; height:34px; border-radius:50%;
    background:radial-gradient(circle at 38% 28%,#c8e8ff,#4488cc 50%,#1a2a5c);
    border:2px solid rgba(255,255,255,.5);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; flex-shrink:0; font-size:1.1rem;
  }
  .nav-avatar-bubble img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .nav-profile-info { display:flex; flex-direction:column; line-height:1.2; }
  .nav-profile-name { font-size:.8rem; font-weight:800; color:white; }
  .nav-profile-sub  { font-size:.55rem; color:rgba(255,255,255,.55); font-family:'Orbitron',monospace; letter-spacing:1px; }

</style>
</head>

<nav>

  <div class="nav-links">
    <a href="index.html">Accueil 🏠</a>

</main>

<script>
  const bg = document.getElementById('bubbleBg');
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 20 + Math.random() * 80;
    b.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${8+Math.random()*14}s;
      animation-delay:${Math.random()*10}s;
    `;
    bg.appendChild(b);
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const BUBBLE_SITE = "https://bullyinventif.github.io/bubble-site/";
  const SUB_ORDER   = {basic:0,plus:1,x:2,max:3};
  const SUB_LABELS  = {basic:"BASIC",plus:"BUBBLE+",x:"BUBBLE X",max:"BUBBLE MAX"};

  const app  = initializeApp({
    apiKey:"AIzaSyAbtOtU3EZd3yccR8gPCef_wME-5qoNk3Y",
    authDomain:"bubble-game-fa894.firebaseapp.com",
    projectId:"bubble-game-fa894",
    storageBucket:"bubble-game-fa894.firebasestorage.app",
    messagingSenderId:"60256418096",
    appId:"1:60256418096:web:dbdc555819793d8c20f0f5"
  });
  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    if (!user) {
      document.body.style.visibility='visible';
      window.location.href = "./login.html";
      return;
    }
    try {
      const snap = await getDoc(doc(db,'users',user.uid));
      const d    = snap.exists() ? snap.data() : {};
      const sub  = d.subscription || 'basic';
      const avatarId = d.avatarId || 'bully_1';

      if (SUB_ORDER[sub] < SUB_ORDER['x']) {
        window.location.href = "./login.html";
        return;
      }

      // Pseudo
      const pseudo = user.displayName || user.email.split('@')[0];

      // Remplir le widget nav
      const nameEl = document.getElementById('navProfileName');
      const subEl  = document.getElementById('navProfileSub');
      const avEl   = document.getElementById('navAvatarBubble');
      if(nameEl) nameEl.textContent = pseudo;
      if(subEl)  subEl.textContent  = SUB_LABELS[sub] || 'BASIC';
      document.body.style.visibility='visible';
      if(avEl)   avEl.innerHTML     = `<img src="${avatarId}.png" alt="avatar" onerror="this.style.display='none'">`;

    } catch(e) {
      window.location.href = "./login.html";
    }
  });
</script>

</body>
