<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeux | Bubble Game</title>
  <link rel="icon" type="image/png" href="bully_icon_site_1.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@600;700;900&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="aura"></div>
  <div class="grid-bg"></div>
  <div class="bubble-bg" id="bubbleBg"></div>

  <nav>
    <a href="./index.html" class="nav-logo">🫧</a>
    <div class="brand">BUBBLE<b>GAME</b></div>
    <div class="nav-links">
      <a href="./index.html">Accueil</a>
      <a href="./jeux.html" class="active">Jeux</a>
      <a href="./credits.html" class="green">Crédits</a>
    </div>
    <a href="https://bullyinventif.github.io/bubble-site/bubble_site_profil.html" class="nav-profile-widget">
      <div class="nav-profile-info">
        <span class="nav-profile-name" id="navProfileName">...</span>
        <span class="nav-profile-sub" id="navProfileSub">—</span>
      </div>
      <div class="nav-avatar-bubble" id="navAvatarBubble">🧙</div>
    </a>
    <button class="nav-burger" id="menuToggle" aria-label="Menu">☰</button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-menu-close" id="menuClose" aria-label="Fermer">✕</button>
    <a href="./index.html">Accueil 🏠</a>
    <a href="./jeux.html" class="active">Jeux 🎮</a>
    <a href="./credits.html">Crédits 👽</a>
  </div>

  <div class="wrap">
    <div class="hero" id="hero"></div>

    <div class="row">
      <h2>Tous les <span>jeux</span></h2>
      <div class="search">
        <input id="search" type="text" placeholder="Rechercher…" aria-label="Rechercher un jeu">
        <span class="ic">🔍</span>
      </div>
    </div>

    <div class="chips">
      <div class="chip active" data-f="all">Tous</div>
      <div class="chip" data-f="new">Nouveaux</div>
      <div class="chip" data-f="popular">Populaires</div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <footer>🫧 Bubble inc. — Copyright | <span id="year"></span></footer>

  <!-- Firebase (version compat, scripts classiques) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <!-- Scripts du site (ordre important) -->
  <script src="firebase-init.js"></script>
  <script src="games-data.js"></script>
  <script src="render.js"></script>
  <script>
    requireAccess();
    initChrome();
    mountBubbles(document.getElementById('bubbleBg'));

    document.getElementById('hero').innerHTML = heroMarkup(gamesByRecent()[0]);

    var grid = document.getElementById('grid');
    var search = document.getElementById('search');
    var filter = 'all';

    function renderGames() {
      var q = search.value.toLowerCase().trim();
      var list = gamesByRecent().filter(function (g) {
        if (q && !g.name.toLowerCase().includes(q)) return false;
        if (filter === 'new') return isNew(g);
        if (filter === 'popular') return isPopular(g);
        return true;
      });
      grid.innerHTML = list.length
        ? list.map(gameCard).join('')
        : '<div class="empty">Aucun jeu trouvé…</div>';
    }

    document.querySelectorAll('.chip').forEach(function (c) {
      c.addEventListener('click', function () {
        document.querySelectorAll('.chip').forEach(function (x) { x.classList.remove('active'); });
        c.classList.add('active');
        filter = c.dataset.f;
        renderGames();
      });
    });
    search.addEventListener('input', renderGames);
    renderGames();
  </script>
</body>
</html>
